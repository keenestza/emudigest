<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EmuDigest — Emulator Aggregator</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;800&family=Silkscreen:wght@400;700&display=swap" rel="stylesheet" />
  <style>
    /* ───── RESET & VARIABLES ───── */
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      /* Brightened Backgrounds for better contrast */
      --bg:        #0f0f15; 
      --bg-card:   #1a1a24;
      --bg-hover:  #252535;
      --border:    #3a3a4c;
      
      /* Much brighter text */
      --text:      #ffffff;       
      --text-dim:  #b0b8c8;       
      
      /* Accents */
      --accent:    #00ff88;
      --accent-2:  #ff3366;
      --accent-3:  #33aaff;
      --accent-4:  #ffcc00;
      --glow:      rgba(0, 255, 136, 0.15);
      
      --font-mono: 'JetBrains Mono', monospace;
      --font-pixel:'Silkscreen', cursive;
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: var(--font-mono);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      line-height: 1.6;
      overflow-x: hidden;
    }

    /* ───── SCANLINE OVERLAY ───── */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0, 0, 0, 0.04) 2px,
        rgba(0, 0, 0, 0.04) 4px
      );
      pointer-events: none;
      z-index: 9999;
    }

    /* ───── BACKGROUND GRID ───── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(0, 255, 136, 0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0, 255, 136, 0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    a { color: var(--accent); text-decoration: none; }
    a:hover { text-decoration: underline; }

    /* ───── HEADER ───── */
    .header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(15, 15, 21, 0.95);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      padding: 1rem 2rem;
    }
    .header-inner {
      max-width: 1280px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }
    
    .header-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      width: 100%;
      gap: 1rem;
    }

    .logo {
      font-family: var(--font-pixel);
      font-size: 1.5rem;
      color: var(--accent);
      text-shadow: 0 0 20px var(--glow), 0 0 40px var(--glow);
      letter-spacing: 2px;
      white-space: nowrap;
      text-decoration: none;
      transition: transform 0.2s ease;
    }
    .logo:hover {
      text-decoration: none;
      transform: scale(1.02);
    }
    .logo span { color: var(--accent-2); }
    
    /* ───── DESKTOP NAVIGATION (Wrapped Tag Cloud) ───── */
    .nav-links {
      display: flex;
      flex-wrap: wrap; /* Allows buttons to elegantly wrap onto new lines on PC */
      gap: 0.5rem;
      width: 100%;
      padding-bottom: 0.5rem;
    }

    .nav-links button {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid #4a4a5a;
      color: #ffffff; 
      font-family: var(--font-mono);
      font-size: 0.75rem;
      padding: 0.4rem 0.8rem;
      cursor: pointer;
      transition: all 0.2s;
      text-transform: uppercase;
      letter-spacing: 1px;
      border-radius: 4px;
    }
    .nav-links button:hover,
    .nav-links button.active {
      border-color: var(--accent);
      color: #000000; 
      background: var(--accent);
      box-shadow: 0 0 10px var(--glow);
      font-weight: 800;
    }
    
    .search-box {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid #4a4a5a;
      color: #ffffff;
      font-family: var(--font-mono);
      font-size: 0.85rem;
      padding: 0.5rem 0.8rem;
      width: 280px;
      outline: none;
      transition: border-color 0.2s;
      border-radius: 4px;
    }
    .search-box::placeholder { color: #b0b8c8; }
    .search-box:focus {
      border-color: var(--accent);
      box-shadow: 0 0 8px var(--glow);
      background: var(--bg-card);
    }

    /* ───── LAYOUT ───── */
    .container {
      max-width: 1280px;
      margin: 0 auto;
      padding: 2rem;
      position: relative;
      z-index: 1;
    }

    .main-grid {
      display: grid;
      grid-template-columns: 1fr 320px;
      gap: 2rem;
      align-items: start;
    }

    /* ───── STATS BAR ───── */
    .stats-bar {
      display: flex;
      gap: 2rem;
      margin-bottom: 2rem;
      padding: 1rem 1.5rem;
      background: var(--bg-card);
      border: 1px solid var(--border);
      flex-wrap: wrap;
      border-radius: 6px;
    }
    .stat {
      display: flex;
      flex-direction: column;
    }
    .stat-value {
      font-family: var(--font-pixel);
      font-size: 1.4rem;
      color: var(--accent);
      text-shadow: 0 0 10px var(--glow);
    }
    .stat-label {
      font-size: 0.7rem;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 1px;
      font-weight: 600;
    }

    /* ───── EMULATOR CARDS ───── */
    .section-title {
      font-family: var(--font-pixel);
      font-size: 0.9rem;
      color: var(--accent-3);
      text-transform: uppercase;
      letter-spacing: 2px;
      margin-bottom: 1rem;
      padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }
    .section-title::before {
      content: '> ';
      color: var(--accent);
    }

    .card-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 1rem;
    }

    .card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 1.25rem;
      transition: all 0.25s ease;
      position: relative;
      overflow: hidden;
      animation: fadeSlideIn 0.4s ease both;
    }
    .card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 4px;
      height: 100%;
      background: var(--accent);
      opacity: 0;
      transition: opacity 0.25s;
    }
    .card:hover {
      border-color: var(--accent);
      background: var(--bg-hover);
      box-shadow: 0 4px 20px rgba(0,0,0,0.4), 0 0 15px var(--glow);
      transform: translateY(-3px);
    }
    .card:hover::before { opacity: 1; }

    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 0.75rem;
    }
    .card-icon {
      font-size: 1.5rem;
      margin-right: 0.5rem;
    }
    .card-name {
      font-family: var(--font-pixel);
      font-size: 0.95rem;
      color: var(--text);
      flex: 1;
      text-shadow: 1px 1px 2px rgba(0,0,0,0.8);
    }
    .card-category {
      font-size: 0.65rem;
      color: #ffffff;
      background: var(--accent-3);
      padding: 0.2rem 0.6rem;
      border-radius: 3px;
      text-transform: uppercase;
      letter-spacing: 1px;
      white-space: nowrap;
      font-weight: 800;
      text-shadow: 1px 1px 1px rgba(0,0,0,0.3);
    }
    .card-desc {
      font-size: 0.8rem;
      color: var(--text-dim);
      margin-bottom: 0.75rem;
      line-height: 1.5;
    }
    .card-meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 0.75rem;
      flex-wrap: wrap;
      gap: 0.5rem;
      background: rgba(0,0,0,0.2);
      padding: 0.5rem;
      border-radius: 4px;
    }
    .card-version {
      color: var(--accent);
      font-weight: 800;
    }
    .card-date { color: var(--text-dim); font-weight: 600; }
    .card-platforms {
      font-size: 0.65rem;
      color: var(--text-dim);
      margin-top: 0.5rem;
      font-weight: 600;
    }
    .card-links {
      display: flex;
      gap: 0.5rem;
      margin-top: 1rem;
    }
    .card-link {
      font-size: 0.7rem;
      padding: 0.35rem 0.6rem;
      border: 1px solid var(--border);
      border-radius: 4px;
      color: var(--text);
      transition: all 0.2s;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      font-weight: 600;
      text-align: center;
      flex: 1;
    }
    .card-link:hover {
      border-color: var(--accent);
      color: var(--accent);
      text-decoration: none;
      background: rgba(0, 255, 136, 0.05);
    }
    .card-link.primary {
      border-color: var(--accent);
      color: var(--accent);
      background: rgba(0, 255, 136, 0.08);
    }

    /* ───── SIDEBAR / FEED ───── */
    .sidebar {
      position: sticky;
      top: 170px; /* Accounts for header size with wrapped buttons */
    }
    .feed-panel {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 6px;
      max-height: 70vh;
      overflow-y: auto;
    }
    .feed-panel::-webkit-scrollbar { width: 6px; }
    .feed-panel::-webkit-scrollbar-track { background: var(--bg); border-radius: 0 6px 6px 0; }
    .feed-panel::-webkit-scrollbar-thumb { background: #4a4a5a; border-radius: 6px; }

    .feed-header {
      font-family: var(--font-pixel);
      font-size: 0.8rem;
      color: var(--accent-4);
      padding: 1rem 1rem 0.75rem;
      text-transform: uppercase;
      letter-spacing: 2px;
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      background: var(--bg-card);
      z-index: 2;
    }
    .feed-header::before {
      content: '● ';
      color: var(--accent-2);
      animation: blink 1.5s infinite;
    }
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.2; }
    }

    .feed-item {
      display: block; 
      padding: 0.85rem 1rem;
      border-bottom: 1px solid var(--border);
      font-size: 0.75rem;
      transition: background 0.15s;
      color: var(--text);
      text-decoration: none;
    }
    .feed-item:hover { 
      background: var(--bg-hover); 
      text-decoration: none;
      cursor: pointer;
      border-left: 3px solid var(--accent);
      padding-left: calc(1rem - 3px);
    }
    .feed-item:hover .feed-msg strong {
      text-shadow: 0 0 8px var(--glow);
    }
    .feed-date {
      color: var(--text-dim);
      font-size: 0.65rem;
      margin-bottom: 0.3rem;
      font-weight: 600;
    }
    .feed-msg { color: var(--text); line-height: 1.5; }
    .feed-msg strong { color: var(--accent); transition: all 0.2s; font-size: 0.85rem;}

    .last-updated {
      font-size: 0.65rem;
      color: var(--text-dim);
      text-align: center;
      padding: 1rem;
      background: rgba(0,0,0,0.2);
      font-weight: 600;
    }

    /* ───── CATEGORY SECTIONS ───── */
    .category-section { margin-bottom: 2.5rem; }
    .no-results {
      grid-column: 1 / -1;
      text-align: center;
      padding: 3rem;
      color: var(--text-dim);
      font-size: 0.9rem;
      font-weight: 600;
    }

    /* ───── ANIMATIONS ───── */
    @keyframes fadeSlideIn {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ───── LOADING ───── */
    .loading {
      text-align: center;
      padding: 4rem;
      font-family: var(--font-pixel);
      color: var(--accent);
      font-size: 1rem;
    }
    .loading::after {
      content: '...';
      animation: dots 1.5s steps(3) infinite;
    }
    @keyframes dots {
      0%   { content: '.'; }
      33%  { content: '..'; }
      66%  { content: '...'; }
    }

    /* ───── FOOTER ───── */
    .footer {
      text-align: center;
      padding: 2rem;
      font-size: 0.75rem;
      color: var(--text-dim);
      border-top: 1px solid var(--border);
      margin-top: 3rem;
      background: var(--bg-card);
    }
    .footer a { color: var(--accent); font-weight: 600; }

    /* ───── RESPONSIVE (MOBILE FIXES) ───── */
    @media (max-width: 900px) {
      .main-grid {
        grid-template-columns: 1fr;
      }
      .sidebar {
        position: static;
        order: 2; /* Puts the Live Feed below the emulators on mobile */
      }
      .feed-panel { max-height: 400px; }
      
      /* Switch to Horizontal Scrolling strictly for Mobile/Tablets */
      .nav-links {
        flex-wrap: nowrap;
        overflow-x: auto;
        -webkit-overflow-scrolling: touch;
        scrollbar-width: none; /* Hides scrollbar in Firefox */
      }
      .nav-links::-webkit-scrollbar {
        display: none; /* Hides scrollbar in Chrome/Safari */
      }
      .nav-links button {
        flex-shrink: 0; /* Keeps buttons from squishing when swiping */
      }
    }
    
    @media (max-width: 600px) {
      .header { padding: 1rem; }
      .header-top {
        flex-direction: column; /* Logo on top left, search below */
        align-items: flex-start; /* Aligns Logo to the Top Left */
      }
      .container { padding: 1rem; }
      .card-grid { grid-template-columns: 1fr; }
      .stats-bar { gap: 1rem; }
      .search-box { width: 100%; }
    }
  </style>
</head>
<body>

  <!-- HEADER -->
  <header class="header">
    <div class="header-inner">
      <div class="header-top">
        <a href="index.html" class="logo">Emu<span>Digest</span></a>
        <input type="text" class="search-box" id="searchInput" placeholder="Search emulators..." />
      </div>
      <nav class="nav-links" id="navLinks">
        <button class="active" data-filter="all">All</button>
      </nav>
    </div>
  </header>

  <!-- MAIN -->
  <div class="container">

    <!-- STATS -->
    <div class="stats-bar" id="statsBar">
      <div class="stat">
        <span class="stat-value" id="statTotal">—</span>
        <span class="stat-label">Emulators Tracked</span>
      </div>
      <div class="stat">
        <span class="stat-value" id="statCategories">—</span>
        <span class="stat-label">Categories</span>
      </div>
      <div class="stat">
        <span class="stat-value" id="statRecent">—</span>
        <span class="stat-label">Updated (30 days)</span>
      </div>
    </div>

    <div class="main-grid">

      <!-- LEFT: Emulator list -->
      <main id="emulatorList">
        <div class="loading" id="loadingState">Loading emulators</div>
      </main>

      <!-- RIGHT / BOTTOM: Feed sidebar -->
      <aside class="sidebar">
        <div class="feed-panel">
          <div class="feed-header">Live Feed</div>
          <div id="feedList"></div>
          <div class="last-updated" id="lastUpdated"></div>
        </div>
      </aside>

    </div>
  </div>

  <!-- FOOTER -->
  <footer class="footer">
    EmuDigest — Open-source emulator aggregator. Data auto-updated via GitHub Actions.<br />
    Built for the preservation community. <a href="https://github.com/keenestza/emudigest" target="_blank">View on GitHub</a>
  </footer>

  <script>
    /* ═══════════════════════════════════════════════
       EmuDigest — Client-Side Logic
       ═══════════════════════════════════════════════ */

    const DATA_URL = 'emulators.json';

    let DB = null;
    let currentFilter = 'all';
    let searchQuery = '';

    // ── Fetch Data ──────────────────────────────────
    async function loadData() {
      try {
        const resp = await fetch(DATA_URL + '?t=' + Date.now());
        DB = await resp.json();
        init();
      } catch (err) {
        document.getElementById('loadingState').textContent =
          'Failed to load data. Make sure emulators.json is in the same directory.';
        console.error(err);
      }
    }

    // ── Initialize ──────────────────────────────────
    function init() {
      buildNav();
      updateStats();
      renderFeed();
      renderEmulators();
      document.getElementById('lastUpdated').textContent =
        'Last checked: ' + formatDate(DB.last_updated);
    }

    // ── Navigation ──────────────────────────────────
    function buildNav() {
      const nav = document.getElementById('navLinks');
      const categories =[...new Set(DB.emulators.map(e => e.category))].sort();

      // "All" button already exists
      categories.forEach(cat => {
        const btn = document.createElement('button');
        btn.textContent = cat;
        btn.dataset.filter = cat;
        btn.addEventListener('click', () => setFilter(cat));
        nav.appendChild(btn);
      });

      // Attach listener to existing All button
      nav.querySelector('[data-filter="all"]').addEventListener('click', () => setFilter('all'));
    }

    function setFilter(filter) {
      currentFilter = filter;
      document.querySelectorAll('.nav-links button').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.filter === filter);
      });
      renderEmulators();
    }

    // ── Stats ───────────────────────────────────────
    function updateStats() {
      const categories = new Set(DB.emulators.map(e => e.category));
      const thirtyDaysAgo = new Date();
      thirtyDaysAgo.setDate(thirtyDaysAgo.getDate() - 30);
      const recent = DB.emulators.filter(e => new Date(e.release_date) >= thirtyDaysAgo).length;

      document.getElementById('statTotal').textContent = DB.emulators.length;
      document.getElementById('statCategories').textContent = categories.size;
      document.getElementById('statRecent').textContent = recent;
    }

    // ── Render Emulators ────────────────────────────
    function renderEmulators() {
      const container = document.getElementById('emulatorList');
      let emulators = [...DB.emulators];

      // Filter by category
      if (currentFilter !== 'all') {
        emulators = emulators.filter(e => e.category === currentFilter);
      }

      // Filter by search
      if (searchQuery) {
        const q = searchQuery.toLowerCase();
        emulators = emulators.filter(e =>
          e.name.toLowerCase().includes(q) ||
          e.category.toLowerCase().includes(q) ||
          e.description.toLowerCase().includes(q)
        );
      }

      if (emulators.length === 0) {
        container.innerHTML = `<div class="no-results">No emulators found matching your criteria.</div>`;
        return;
      }

      // Group by category
      const grouped = {};
      emulators.forEach(e => {
        if (!grouped[e.category]) grouped[e.category] = [];
        grouped[e.category].push(e);
      });

      let html = '';
      const sortedCategories = Object.keys(grouped).sort();

      sortedCategories.forEach(cat => {
        html += `<div class="category-section">`;
        html += `<div class="section-title">${cat}</div>`;
        html += `<div class="card-grid">`;

        grouped[cat]
          .sort((a, b) => new Date(b.release_date) - new Date(a.release_date))
          .forEach((emu, i) => {
            html += renderCard(emu, i);
          });

        html += `</div></div>`;
      });

      container.innerHTML = html;
    }

    function renderCard(emu, index) {
      const platforms = emu.platforms ? emu.platforms.join(' · ') : '';
      return `
        <div class="card" style="animation-delay: ${index * 0.05}s">
          <div class="card-header">
            <span class="card-icon">${emu.icon || '🎮'}</span>
            <span class="card-name">${emu.name}</span>
            <span class="card-category">${emu.category}</span>
          </div>
          <div class="card-desc">${emu.description}</div>
          <div class="card-meta">
            <span class="card-version">v${emu.latest_version}</span>
            <span class="card-date">${formatDate(emu.release_date)}</span>
          </div>
          ${platforms ? `<div class="card-platforms">${platforms}</div>` : ''}
          <div class="card-links">
            <a class="card-link primary" href="${emu.download_url}" target="_blank" rel="noopener">Download</a>
            <a class="card-link" href="${emu.website}" target="_blank" rel="noopener">Website</a>
            ${emu.github ? `<a class="card-link" href="https://github.com/${emu.github}" target="_blank" rel="noopener">GitHub</a>` : ''}
          </div>
        </div>
      `;
    }

    // ── Render Feed ─────────────────────────────────
    function renderFeed() {
      const feedEl = document.getElementById('feedList');
      if (!DB.feed || DB.feed.length === 0) {
        feedEl.innerHTML = '<div class="feed-item" style="cursor:default; border-left:none;"><div class="feed-msg">No updates yet.</div></div>';
        return;
      }

      feedEl.innerHTML = DB.feed.map(entry => {
        // Find the emulator name and link from the entry
        const emu = DB.emulators.find(e => e.id === entry.emulator_id);
        const name = emu ? emu.name : entry.emulator_id;
        const link = emu ? emu.download_url : '#';

        return `
          <a href="${link}" target="_blank" rel="noopener" class="feed-item">
            <div class="feed-date">${formatDate(entry.date)}</div>
            <div class="feed-msg"><strong>${name}</strong> ${entry.version} — ${entry.message}</div>
          </a>
        `;
      }).join('');
    }

    // ── Search ──────────────────────────────────────
    document.getElementById('searchInput').addEventListener('input', (e) => {
      searchQuery = e.target.value.trim();
      renderEmulators();
    });

    // ── Helpers ─────────────────────────────────────
    function formatDate(dateStr) {
      if (!dateStr) return '—';
      const d = new Date(dateStr);
      return d.toLocaleDateString('en-US', { year: 'numeric', month: 'short', day: 'numeric' });
    }

    // ── Boot ────────────────────────────────────────
    loadData();
  </script>

</body>
</html>
